---
# -------------------------------------------------------------------------
# Create a single compact cluster
# Variables passed in: _cluster_name, _username
# -------------------------------------------------------------------------

- name: Create pull secret for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "pullsecret-{{ _cluster_name }}"
        namespace: "{{ ocp4_workload_agent_compact_vms_namespace }}"
      type: kubernetes.io/dockerconfigjson
      stringData:
        .dockerconfigjson: "{{ ocp4_workload_agent_compact_vms_pullsecret }}"

- name: Create InfraEnv for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    template: infraenv.yaml.j2

- name: Wait for InfraEnv ISO URL to be ready for {{ _cluster_name }}
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: InfraEnv
    name: "infraenv-{{ _cluster_name }}"
    namespace: "{{ ocp4_workload_agent_compact_vms_namespace }}"
  register: r_infraenv
  retries: 60
  delay: 10
  until:
  - r_infraenv.resources | length > 0
  - r_infraenv.resources[0].status is defined
  - r_infraenv.resources[0].status.isoDownloadURL is defined
  - r_infraenv.resources[0].status.isoDownloadURL | length > 0

- name: Store ISO URL for {{ _cluster_name }}
  ansible.builtin.set_fact:
    _iso_download_url: "{{ r_infraenv.resources[0].status.isoDownloadURL }}"

- name: "Create VirtualMachines (3 nodes): {{ _cluster_name }}"
  kubernetes.core.k8s:
    state: present
    template: virtualmachine.yaml.j2
  loop:
  - master-0
  - master-1
  - master-2
  loop_control:
    loop_var: _node_name
  vars:
    _vm_name: "{{ _cluster_name }}-{{ _node_name }}"

- name: Wait for all VirtualMachines to be running for {{ _cluster_name }}
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachineInstance
    name: "{{ _cluster_name }}-{{ _node_item }}"
    namespace: "{{ ocp4_workload_agent_compact_vms_namespace }}"
  register: r_vmi
  retries: 30
  delay: 10
  until:
  - r_vmi.resources | length > 0
  - r_vmi.resources[0].status is defined
  - r_vmi.resources[0].status.phase is defined
  - r_vmi.resources[0].status.phase == "Running"
  loop:
  - master-0
  - master-1
  - master-2
  loop_control:
    loop_var: _node_item

- name: Wait for all 3 Agents to be discovered for {{ _cluster_name }}
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    namespace: "{{ ocp4_workload_agent_compact_vms_namespace }}"
    label_selectors:
    - "cluster-name={{ _cluster_name }}"
  register: r_agents
  retries: "{{ (ocp4_workload_agent_compact_vms_agent_discovery_timeout | int / 10) | int }}"
  delay: 10
  until:
  - r_agents.resources | length == 3

- name: Approve all Agents for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: patched
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    name: "{{ _agent_item.metadata.name }}"
    namespace: "{{ ocp4_workload_agent_compact_vms_namespace }}"
    definition:
      spec:
        approved: true
        role: master
  loop: "{{ r_agents.resources }}"
  loop_control:
    loop_var: _agent_item
    label: "{{ _agent_item.metadata.name }}"

- name: Wait for all Agents to be in known state for {{ _cluster_name }}
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    name: "{{ _agent_item.metadata.name }}"
    namespace: "{{ ocp4_workload_agent_compact_vms_namespace }}"
  register: r_agent_known
  retries: 30
  delay: 10
  until:
  - r_agent_known.resources | length > 0
  - r_agent_known.resources[0].status is defined
  - r_agent_known.resources[0].status.debugInfo is defined
  - r_agent_known.resources[0].status.debugInfo.state is defined
  - r_agent_known.resources[0].status.debugInfo.state in ["known", "insufficient"]
  loop: "{{ r_agents.resources }}"
  loop_control:
    loop_var: _agent_item
    label: "{{ _agent_item.metadata.name }}"

- name: "Extract machine network CIDR from first Agent: {{ _cluster_name }}"
  ansible.builtin.set_fact:
    _machine_network_cidr: >-
      {{
        r_agents.resources[0].status.inventory.interfaces
        | selectattr('ipV4Addresses', 'defined')
        | map(attribute='ipV4Addresses')
        | flatten
        | select('match', '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/')
        | first
      }}
  when:
  - ocp4_workload_agent_compact_vms_machine_network_cidr | length == 0
  - r_agents.resources[0].status.inventory is defined
  - r_agents.resources[0].status.inventory.interfaces is defined

- name: Use provided machine network CIDR for {{ _cluster_name }}
  ansible.builtin.set_fact:
    _machine_network_cidr: "{{ ocp4_workload_agent_compact_vms_machine_network_cidr }}"
  when: ocp4_workload_agent_compact_vms_machine_network_cidr | length > 0

- name: Display detected network CIDR for {{ _cluster_name }}
  ansible.builtin.debug:
    msg: "Using machine network CIDR: {{ _machine_network_cidr }}"

- name: "Remove ISO cdrom from all VMs: {{ _cluster_name }}"
  kubernetes.core.k8s:
    state: present
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ _cluster_name }}-{{ _node_item }}"
    namespace: "{{ ocp4_workload_agent_compact_vms_namespace }}"
    definition:
      spec:
        template:
          spec:
            domain:
              devices:
                disks:
                - name: rootdisk
                  bootOrder: 1
                  disk:
                    bus: virtio
            volumes:
            - name: rootdisk
              dataVolume:
                name: "{{ _cluster_name }}-{{ _node_item }}-rootdisk"
  loop:
  - master-0
  - master-1
  - master-2
  loop_control:
    loop_var: _node_item

- name: Wait for VMs to restart after ISO removal for {{ _cluster_name }}
  ansible.builtin.pause:
    seconds: 10

- name: Create AgentClusterInstall for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    template: agentclusterinstall.yaml.j2

- name: Create ClusterDeployment for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    template: clusterdeployment.yaml.j2

- name: "Cluster resources created successfully: {{ _cluster_name }}"
  ansible.builtin.debug:
    msg: "compact cluster {{ _cluster_name }} is now provisioning"
