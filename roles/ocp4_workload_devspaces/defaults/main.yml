---
ocp4_workload_devspaces_channel: stable
ocp4_workload_devspaces_startingcsv: ""

ocp4_workload_devspaces_catalogsource_setup: false
ocp4_workload_devspaces_catalogsource_name: devspaces-catalogsource
ocp4_workload_devspaces_catalogsource_image: ""
ocp4_workload_devspaces_catalogsource_tag: ""
ocp4_workload_devspaces_namespace: openshift-devspaces

# Workspace limits
ocp4_workload_devspaces_max_number_of_workspaces: 2
ocp4_workload_devspaces_max_number_of_running_workspaces: 1

ocp4_workload_devspaces_setup_devworkspaces: false
ocp4_workload_devspaces_devworkspace_devfile: >-
  http://devspaces-dashboard.openshift-devspaces.svc.cluster.local:8080/dashboard/api/editors/devfile?che-editor=che-incubator/che-code/latest

# Either have one user specified with ocp4_workload_devspaces_username
ocp4_workload_devspaces_username: user1
# Or have a number of users starting with ocp4_workload_devspaces_user_base
# ocp4_workload_devspaces_user_base: user
# ocp4_workload_devspaces_user_count: 2

ocp4_workload_devspaces_devworkspace_project: project
ocp4_workload_devspaces_devworkspace_name: workspace
# Actual namespace will be either ocp4_workload_devspaces_devworkspace_namespace_base-ocp4_workload_devspaces_username
# or ocp4_workload_devspaces_devworkspace_namespace_base-ocp4_workload_devspaces_user_baseXX
ocp4_workload_devspaces_devworkspace_namespace_base: devworkspace-

# Repo to be cloned into the devworkspace - one of the two options must be set
# Either the full path to a repository
# ocp4_workload_devspaces_devworkspace_git_repo: https://github.com/eclipse-che/che-docs

# Or the Base followed by userXX followed by repo name
# ocp4_workload_devspaces_devworkspace_git_repo_base: http://gitea.gitea.svc:3000
# ocp4_workload_devspaces_devworkspace_git_repo_name: reponame

ocp4_workload_devspaces_devworkspace_git_revision: main

ocp4_workload_devspaces_devworkspace_components:
- name: tooling
  container:
    image: registry.redhat.io/devspaces/udi-base-rhel10:latest
    # image: registry.redhat.io/devspaces/udi-rhel8:latest
    # image: registry.redhat.io/devspaces/udi-rhel9:latest

# -------------------------------------------------------------------
# OAuth Client Token Configuration
# -------------------------------------------------------------------
# Configure token lifetimes for the DevSpaces OAuth client
# to prevent double-authentication issues on first login.
# If not set or empty, these settings will be omitted from the OAuth client.
#
# Default OpenShift cluster-wide OAuth token settings are typically:
#   accessTokenMaxAgeSeconds: 86400 (24 hours)
#   accessTokenInactivityTimeout: 300 (5 minutes)
#
# Leave empty/undefined to use cluster defaults:
ocp4_workload_devspaces_oauth_access_token_max_age_seconds: ""
ocp4_workload_devspaces_oauth_access_token_inactivity_timeout: ""

# Example recommended values to prevent double-auth:
# ocp4_workload_devspaces_oauth_access_token_max_age_seconds: 86400
# ocp4_workload_devspaces_oauth_access_token_inactivity_timeout: 3600

# Set to "auto" to skip OAuth consent screen, preventing iframe auth issues
ocp4_workload_devspaces_oauth_grant_method: ""
