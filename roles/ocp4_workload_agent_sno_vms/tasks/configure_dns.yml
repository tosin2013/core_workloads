---
# -------------------------------------------------------------------------
# Configure CoreDNS on hub cluster to resolve SNO cluster domains
# -------------------------------------------------------------------------

- name: Get CoreDNS ConfigMap
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: dns-default
    namespace: openshift-dns
  register: r_coredns_cm

- name: Extract current Corefile
  ansible.builtin.set_fact:
    _current_corefile: "{{ r_coredns_cm.resources[0].data.Corefile }}"
  when: r_coredns_cm.resources | length > 0

- name: Build DNS rewrite rules for SNO clusters
  ansible.builtin.set_fact:
    _dns_rewrites: |
      {% for cluster in _ocp4_workload_agent_sno_vms_clusters %}
      {%   set vip = _ocp4_workload_agent_sno_vms_vips[cluster.name] | default('') %}
      {%   if vip %}
              rewrite stop {
                  name regex api\.{{ cluster.name | regex_escape }}\.{{ ocp4_workload_agent_sno_vms_base_domain | regex_escape }} {{ vip }}
                  answer name {{ vip }} api.{{ cluster.name }}.{{ ocp4_workload_agent_sno_vms_base_domain }}
              }
              rewrite stop {
                  name regex api-int\.{{ cluster.name | regex_escape }}\.{{ ocp4_workload_agent_sno_vms_base_domain | regex_escape }} {{ vip }}
                  answer name {{ vip }} api-int.{{ cluster.name }}.{{ ocp4_workload_agent_sno_vms_base_domain }}
              }
              rewrite stop {
                  name regex (.*)\.apps\.{{ cluster.name | regex_escape }}\.{{ ocp4_workload_agent_sno_vms_base_domain | regex_escape }} {{ vip }}
                  answer name {{ vip }} {1}.apps.{{ cluster.name }}.{{ ocp4_workload_agent_sno_vms_base_domain }}
              }
      {%   endif %}
      {% endfor %}

- name: Update CoreDNS Corefile with SNO cluster rewrites
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: dns-default
        namespace: openshift-dns
        labels:
          dns.operator.openshift.io/owning-dns: default
      data:
        Corefile: |
          .:5353 {
              bufsize 1232
              errors
              log . {
                  class error
              }
              health {
                  lameduck 20s
              }
              ready
              # SNO cluster DNS rewrites - managed by ocp4_workload_agent_sno_vms
          {{ _dns_rewrites }}
              kubernetes cluster.local in-addr.arpa ip6.arpa {
                  pods insecure
                  fallthrough in-addr.arpa ip6.arpa
              }
              prometheus 127.0.0.1:9153
              forward . /etc/resolv.conf {
                  policy sequential
              }
              cache 900 {
                  denial 9984 30
              }
              reload
          }
          hostname.bind:5353 {
              chaos
          }
  when:
  - _dns_rewrites is defined
  - _dns_rewrites | length > 0

- name: Wait for CoreDNS to reload configuration
  ansible.builtin.pause:
    seconds: 5

- name: Display DNS configuration status
  ansible.builtin.debug:
    msg: "CoreDNS configured for {{ _ocp4_workload_agent_sno_vms_clusters | length }} SNO cluster(s)"
