---
# -------------------------------------------------------------------------
# Create a single SNO cluster
# Variables passed in: _cluster_name, _username
# -------------------------------------------------------------------------

- name: Create pull secret for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "pullsecret-{{ _cluster_name }}"
        namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
      type: kubernetes.io/dockerconfigjson
      stringData:
        .dockerconfigjson: "{{ ocp4_workload_agent_sno_vms_pullsecret }}"

- name: Create InfraEnv for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    template: infraenv.yaml.j2

- name: Wait for InfraEnv ISO URL to be ready for {{ _cluster_name }}
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: InfraEnv
    name: "infraenv-{{ _cluster_name }}"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
  register: r_infraenv
  retries: 60
  delay: 10
  until:
  - r_infraenv.resources | length > 0
  - r_infraenv.resources[0].status is defined
  - r_infraenv.resources[0].status.isoDownloadURL is defined
  - r_infraenv.resources[0].status.isoDownloadURL | length > 0

- name: Store ISO URL for {{ _cluster_name }}
  ansible.builtin.set_fact:
    _iso_download_url: "{{ r_infraenv.resources[0].status.isoDownloadURL }}"

- name: Create VirtualMachine for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    template: virtualmachine.yaml.j2

- name: Wait for VirtualMachine to be running for {{ _cluster_name }}
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachineInstance
    name: "{{ _cluster_name }}-master-0"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
  register: r_vmi
  retries: 30
  delay: 10
  until:
  - r_vmi.resources | length > 0
  - r_vmi.resources[0].status is defined
  - r_vmi.resources[0].status.phase is defined
  - r_vmi.resources[0].status.phase == "Running"

- name: Wait for Agent to be discovered for {{ _cluster_name }}
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
    label_selectors:
    - "cluster-name={{ _cluster_name }}"
  register: r_agents
  retries: "{{ (ocp4_workload_agent_sno_vms_agent_discovery_timeout | int / 10) | int }}"
  delay: 10
  until:
  - r_agents.resources | length == 1

- name: Store Agent name for {{ _cluster_name }}
  ansible.builtin.set_fact:
    _agent_name: "{{ r_agents.resources[0].metadata.name }}"

- name: Approve Agent for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: patched
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    name: "{{ _agent_name }}"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
    definition:
      spec:
        approved: true
        role: master

- name: Wait for Agent to be in known state for {{ _cluster_name }}
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    name: "{{ _agent_name }}"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
  register: r_agent_known
  retries: 30
  delay: 10
  until:
  - r_agent_known.resources | length > 0
  - r_agent_known.resources[0].status is defined
  - r_agent_known.resources[0].status.debugInfo is defined
  - r_agent_known.resources[0].status.debugInfo.state is defined
  - r_agent_known.resources[0].status.debugInfo.state in ["known", "known-unbound", "insufficient"]

- name: Extract IP address from first Agent for {{ _cluster_name }}
  ansible.builtin.set_fact:
    _agent_ip: >-
      {{
        r_agent_known.resources[0].status.inventory.interfaces
        | selectattr('ipV4Addresses', 'defined')
        | map(attribute='ipV4Addresses')
        | flatten
        | select('match', '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+/')
        | first
      }}
  when:
  - ocp4_workload_agent_sno_vms_machine_network_cidr | length == 0
  - r_agent_known.resources[0].status.inventory is defined
  - r_agent_known.resources[0].status.inventory.interfaces is defined

- name: Calculate network CIDR from Agent IP for {{ _cluster_name }}
  ansible.builtin.set_fact:
    _machine_network_cidr: "{{ _agent_ip | ansible.utils.ipaddr('network/prefix') }}"
  when:
  - ocp4_workload_agent_sno_vms_machine_network_cidr | length == 0
  - _agent_ip is defined

- name: Use provided machine network CIDR for {{ _cluster_name }}
  ansible.builtin.set_fact:
    _machine_network_cidr: "{{ ocp4_workload_agent_sno_vms_machine_network_cidr }}"
  when: ocp4_workload_agent_sno_vms_machine_network_cidr | length > 0

- name: Display detected network CIDR for {{ _cluster_name }}
  ansible.builtin.debug:
    msg: "Using machine network CIDR: {{ _machine_network_cidr }}"

- name: Create AgentClusterInstall for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    template: agentclusterinstall.yaml.j2

- name: Create ClusterDeployment for {{ _cluster_name }}
  kubernetes.core.k8s:
    state: present
    template: clusterdeployment.yaml.j2

- name: "Bind Agent to ClusterDeployment for {{ _cluster_name }}"
  kubernetes.core.k8s:
    state: patched
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    name: "{{ _agent_name }}"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
    definition:
      spec:
        clusterDeploymentName:
          name: "{{ _cluster_name }}"
          namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"

- name: "Wait for Agent to bind to cluster {{ _cluster_name }}"
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    name: "{{ _agent_name }}"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
  register: r_agent_bound
  retries: 30
  delay: 5
  until:
  - r_agent_bound.resources | length > 0
  - r_agent_bound.resources[0].spec is defined
  - r_agent_bound.resources[0].spec.clusterDeploymentName is defined
  - r_agent_bound.resources[0].spec.clusterDeploymentName.name is defined
  - r_agent_bound.resources[0].spec.clusterDeploymentName.name == _cluster_name

- name: "Wait for Agent installation to reach reboot stage: {{ _cluster_name }}"
  kubernetes.core.k8s_info:
    api_version: agent-install.openshift.io/v1beta1
    kind: Agent
    name: "{{ _agent_name }}"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
  register: r_agent_progress
  retries: "{{ (ocp4_workload_agent_sno_vms_iso_removal_timeout | default(1800) | int / 30) | int }}"
  delay: 30
  until:
  - r_agent_progress.resources | length > 0
  - r_agent_progress.resources[0].status.progress is defined
  - r_agent_progress.resources[0].status.progress.currentStage is defined
  - r_agent_progress.resources[0].status.progress.currentStage in ["Rebooting", "Done"]

- name: "Display installation progress: {{ _cluster_name }}"
  ansible.builtin.debug:
    msg: >-
      Agent reached stage: {{ r_agent_progress.resources[0].status.progress.currentStage }},
      {{ r_agent_progress.resources[0].status.progress.installationPercentage | default(0) }}% complete

- name: "Remove ISO cdrom from VM: {{ _cluster_name }}"
  kubernetes.core.k8s:
    state: present
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ _cluster_name }}-master-0"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
    definition:
      spec:
        dataVolumeTemplates:
        - metadata:
            name: "{{ _cluster_name }}-master-0-rootdisk"
          spec:
            pvc:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: "{{ ocp4_workload_agent_sno_vms_disk_size }}"
              storageClassName: "{{ ocp4_workload_agent_sno_vms_storage_class }}"
              volumeMode: Block
            source:
              blank: {}
        template:
          spec:
            domain:
              devices:
                disks:
                - name: rootdisk
                  bootOrder: 1
                  disk:
                    bus: virtio
            volumes:
            - name: rootdisk
              dataVolume:
                name: "{{ _cluster_name }}-master-0-rootdisk"

- name: "Stop VM to apply new boot configuration: {{ _cluster_name }}"
  kubernetes.core.k8s:
    state: present
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ _cluster_name }}-master-0"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
    definition:
      spec:
        running: false

- name: "Wait for VM to stop: {{ _cluster_name }}"
  kubernetes.core.k8s_info:
    api_version: kubevirt.io/v1
    kind: VirtualMachineInstance
    name: "{{ _cluster_name }}-master-0"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
  register: r_vmi_stopped
  retries: 30
  delay: 2
  until: r_vmi_stopped.resources | length == 0

- name: "Start VM with new boot configuration: {{ _cluster_name }}"
  kubernetes.core.k8s:
    state: present
    api_version: kubevirt.io/v1
    kind: VirtualMachine
    name: "{{ _cluster_name }}-master-0"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
    definition:
      spec:
        running: true

- name: "Wait for VM to restart and boot from disk: {{ _cluster_name }}"
  ansible.builtin.pause:
    seconds: 30

- name: "Wait for AgentClusterInstall to populate API VIP: {{ _cluster_name }}"
  kubernetes.core.k8s_info:
    api_version: extensions.hive.openshift.io/v1beta1
    kind: AgentClusterInstall
    name: "{{ _cluster_name }}"
    namespace: "{{ ocp4_workload_agent_sno_vms_namespace }}"
  register: r_aci_vip
  retries: 60
  delay: 5
  until:
  - r_aci_vip.resources | length > 0
  - r_aci_vip.resources[0].status is defined
  - r_aci_vip.resources[0].status.apiVIP is defined
  - r_aci_vip.resources[0].status.apiVIP | length > 0

- name: "Store API VIP for DNS configuration: {{ _cluster_name }}"
  ansible.builtin.set_fact:
    _ocp4_workload_agent_sno_vms_vips: >-
      {{ _ocp4_workload_agent_sno_vms_vips | default({}) | combine({
        _cluster_name: r_aci_vip.resources[0].status.apiVIP
      }) }}

- name: "Display cluster VIP: {{ _cluster_name }}"
  ansible.builtin.debug:
    msg: "SNO cluster {{ _cluster_name }} API VIP: {{ r_aci_vip.resources[0].status.apiVIP }}"

- name: "Create API Route for external access: {{ _cluster_name }}"
  ansible.builtin.include_tasks:
    file: create_api_route.yml
  vars:
    _api_vip: "{{ r_aci_vip.resources[0].status.apiVIP }}"

- name: "Cluster resources created successfully: {{ _cluster_name }}"
  ansible.builtin.debug:
    msg: "SNO cluster {{ _cluster_name }} is now provisioning"
